apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
spec:
  template:
    spec:
      containers:
        - imagePullPolicy: IfNotPresent
          name: dex
          env:
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: argocd-dex-server-sa
                  key: token
            - name: ARGO_WORKFLOWS_SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: argo-workflows-sso
                  key: client-secret
      initContainers:
        - imagePullPolicy: IfNotPresent
          name: copyutil