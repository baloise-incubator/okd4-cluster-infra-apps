apiVersion: v1
kind: ServiceAccount
metadata:
  name: openhands-oauth-proxy
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.primary: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"openhands"}}'
---
apiVersion: v1
kind: Secret
metadata:
  name: openhands-oauth-proxy-cookie
type: Opaque
stringData:
  cookie-secret: tCbg1u5zBQIIAoWyGN+TEXdZJuJI7yGZhkHDXER/Lxc=
---
apiVersion: v1
kind: Service
metadata:
  name: openhands-oauth-proxy
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: openhands-proxy-tls
spec:
  selector:
    app: openhands-oauth-proxy
  ports:
    - port: 8443
      targetPort: 8443
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands-oauth-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openhands-oauth-proxy
  template:
    metadata:
      labels:
        app: openhands-oauth-proxy
    spec:
      serviceAccountName: openhands-oauth-proxy
      containers:
        - name: oauth-proxy
          image: quay.io/openshift/origin-oauth-proxy:4.17
          args:
            - --https-address=:8443
            - --provider=openshift
            - --openshift-service-account=openhands-oauth-proxy
            - --upstream=http://openhands:3000
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/proxy/cookie/cookie-secret
            - --skip-provider-button=true
            - '--openshift-sar={"namespace":"openhands","resource":"services","verb":"get","resourceName":"openhands"}'
          ports:
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: cookie-secret
              mountPath: /etc/proxy/cookie
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: openhands-proxy-tls
        - name: cookie-secret
          secret:
            secretName: openhands-oauth-proxy-cookie
