apiVersion: v1
kind: ServiceAccount
metadata:
  name: openhands
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands
  labels:
    app: openhands
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openhands
  template:
    metadata:
      labels:
        app: openhands
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: openhands
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
        - name: openhands
          image: ghcr.io/all-hands-ai/openhands:main
          command: ["/bin/bash", "-c"]
          args:
            - |
              apt-get update -qq && apt-get install -y -qq tmux > /dev/null 2>&1
              python -c "
              import os, json
              store = '/.openhands'
              os.makedirs(store, exist_ok=True)
              from openhands.storage.data_models.settings import Settings
              s = Settings.from_config()
              if s:
                  with open(os.path.join(store, 'settings.json'), 'w') as f:
                      f.write(s.model_dump_json(context={'expose_secrets': True}))
              gh = os.environ.get('GITHUB_TOKEN', '')
              if gh:
                  secrets = {'provider_tokens': {'github': {'token': gh, 'host': 'github.com', 'user_id': None}}, 'custom_secrets': {}}
                  with open(os.path.join(store, 'secrets.json'), 'w') as f:
                      json.dump(secrets, f)
              "
              exec python -m openhands.server
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: RUNTIME
              value: local
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: litellm-api-key
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: github-token
          volumeMounts:
            - name: config
              mountPath: /app/config.toml
              subPath: config.toml
            - name: workspace
              mountPath: /opt/workspace
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: config
          configMap:
            name: openhands-config
        - name: workspace
          persistentVolumeClaim:
            claimName: openhands-workspace
        - name: tmp
          emptyDir: {}
