apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openhands-access
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["openhands"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openhands-access-niiku
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openhands-access
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: niiku
