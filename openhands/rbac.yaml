apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openhands-access
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["openhands"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openhands-access-niiku
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openhands-access
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: niiku
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubedock-manager
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["create", "get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubedock-manager-openhands
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubedock-manager
subjects:
  - kind: ServiceAccount
    name: openhands
