apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kubernetes-argocd
  namespace: argo-workflows
spec:
  provider:
    kubernetes:
      remoteNamespace: argocd
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        token:
          bearerToken:
            name: eso-secret-reader-token
            key: token
