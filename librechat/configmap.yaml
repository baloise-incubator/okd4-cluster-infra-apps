apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
data:
  librechat.yaml: |
    version: 1.2.1

    mcpServers:
      argo-dispatch:
        type: streamable-http
        url: http://argo-dispatch.agent-platform.svc.cluster.local:8080/mcp
        serverInstructions: true
        timeout: 30000

    endpoints:
      custom:
        - name: "LLM"
          apiKey: "${LITELLM_API_KEY}"
          baseURL: "http://litellm.litellm.svc.cluster.local:4000"
          models:
            default:
              - "${LITELLM_MODEL}"
            fetch: false

