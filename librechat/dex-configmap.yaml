apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
data:
  config.yaml: |
    issuer: https://librechat-dex.baloise.dev

    storage:
      type: memory

    web:
      http: 0.0.0.0:5556

    connectors:
      - type: openshift
        id: openshift
        name: OpenShift
        config:
          issuer: https://api.incubator.baloise.dev:6443
          # SA as OAuth client — no OAuthClient CRD needed.
          # The redirect URI is registered via the SA annotation in dex-rbac.yaml.
          clientID: system:serviceaccount:librechat:dex-sa
          clientSecret: $OPENSHIFT_SA_TOKEN
          redirectURI: https://librechat-dex.baloise.dev/callback

    oauth2:
      skipApprovalScreen: true
      responseTypes:
        - code

    staticClients:
      - id: librechat
        name: LibreChat
        secret: $LIBRECHAT_CLIENT_SECRET
        redirectURIs:
          - https://librechat.baloise.dev/oauth/openid/callback
