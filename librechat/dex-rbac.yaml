# ServiceAccount for the Dex pod.
# Acts as the OpenShift OAuth client — no OAuthClient CRD needed.
# OKD treats a SA as an OAuth client when it has the redirect URI annotation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dex-sa
  annotations:
    serviceaccounts.openshift.io/oauth-redirecturi.dex: https://librechat-dex.baloise.dev/callback
---
# Long-lived token for dex-sa. OKD auto-populates the `token` field.
# Dex uses it as the OAuth client secret when authenticating with OpenShift.
apiVersion: v1
kind: Secret
metadata:
  name: dex-sa-token
  annotations:
    kubernetes.io/service-account.name: dex-sa
type: kubernetes.io/service-account-token
---
# ServiceAccount for MongoDB. Needs anyuid SCC because the official mongo:7
# image runs as root (uid=999 internally) — OKD's random UID assignment breaks it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongodb-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: librechat-mongodb-anyuid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: mongodb-sa
    namespace: librechat
