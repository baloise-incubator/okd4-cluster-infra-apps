apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  labels:
    app: dex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: dex-sa
      securityContext:
        runAsNonRoot: true
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.41.1
          command:
            - /usr/local/bin/dex
            - serve
            - /etc/dex/config.yaml
          ports:
            - name: http
              containerPort: 5556
              protocol: TCP
          env:
            - name: OPENSHIFT_SA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dex-sa-token
                  key: token
            - name: LIBRECHAT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dex-secrets
                  key: librechat-client-secret
          volumeMounts:
            - name: config
              mountPath: /etc/dex/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "200m"
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: dex-config
