apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm-non_root:main-stable
          args:
            - --config
            - /app/config.yaml
            - --port
            - "4000"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: LITELLM_MIGRATION_DIR
              value: /tmp/migrations
            - name: AZURE_FOUNDRY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: azure-foundry-api-key
            - name: AZURE_FOUNDRY_ROUTER_API_BASE
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: azure-foundry-router-api-base
            - name: AZURE_FOUNDRY_ANTHROPIC_API_BASE
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: azure-foundry-anthropic-api-base
            - name: AZURE_FOUNDRY_OPENAI_API_BASE
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: azure-foundry-openai-api-base
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: master-key
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://litellm:$(POSTGRES_PASSWORD)@postgresql:5432/litellm?sslmode=disable"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: prisma-cache
              mountPath: /.cache
            - name: npm-cache
              mountPath: /.npm
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: prisma-cache
          emptyDir: {}
        - name: npm-cache
          emptyDir: {}
