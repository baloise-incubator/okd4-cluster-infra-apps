      # Via Dedicated Claude endpoint (Anthropic Messages API)
      - model_name: claude-haiku-4-5
        litellm_params:
          model: anthropic/claude-haiku-4-5
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_ANTHROPIC_API_BASE
        model_info:
