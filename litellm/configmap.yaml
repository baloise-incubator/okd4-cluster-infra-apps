apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  strip_top_p.py: |
    from litellm.integrations.custom_logger import CustomLogger
    from litellm.llms.anthropic.chat.transformation import AnthropicConfig

    _orig_map = AnthropicConfig.map_openai_params

    def _patched_map(self, non_default_params, optional_params, model, drop_params):
        result = _orig_map(self, non_default_params, optional_params, model, drop_params)
        if "temperature" in result and "top_p" in result:
            result.pop("top_p", None)
        return result

    AnthropicConfig.map_openai_params = _patched_map

    strip_top_p = CustomLogger()
  config.yaml: |
    model_list:
      # Via Model Router
      - model_name: gpt-4o
        litellm_params:
          model: azure_ai/gpt-4o
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_ROUTER_API_BASE
        model_info:
          base_model: gpt-4o

      - model_name: gpt-4o-mini
        litellm_params:
          model: azure_ai/gpt-4o-mini
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_ROUTER_API_BASE
        model_info:
          base_model: gpt-4o-mini

      - model_name: gpt-4.1-nano
        litellm_params:
          model: azure_ai/gpt-4.1-nano
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_ROUTER_API_BASE
        model_info:
          base_model: gpt-4.1-nano

      - model_name: gpt-4.1-mini
        litellm_params:
          model: azure_ai/gpt-4.1-mini
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_ROUTER_API_BASE
        model_info:
          base_model: gpt-4.1-mini

      - model_name: gpt-4.1
        litellm_params:
          model: azure_ai/gpt-4.1
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_ROUTER_API_BASE
        model_info:
          base_model: gpt-4.1

      - model_name: o4-mini
        litellm_params:
          model: azure_ai/o4-mini
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_ROUTER_API_BASE
        model_info:
          base_model: o4-mini

      - model_name: gpt-5-nano
        litellm_params:
          model: azure_ai/gpt-5-nano
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_ROUTER_API_BASE
