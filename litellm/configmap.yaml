      - model_name: claude-sonnet-4-5
        litellm_params:
          model: anthropic/claude-sonnet-4-5
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_ANTHROPIC_API_BASE
        model_info:
