      - model_name: claude-opus-4-6
        litellm_params:
          model: anthropic/claude-opus-4-6
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_ANTHROPIC_API_BASE
        model_info:
          base_model: claude-opus-4-6

      # Via Dedicated OpenAI endpoint
      - model_name: gpt-5-mini
        litellm_params:
          model: azure_ai/gpt-5-mini
          api_key: os.environ/AZURE_FOUNDRY_API_KEY
          api_base: os.environ/AZURE_FOUNDRY_OPENAI_API_BASE
          api_version: "2025-01-01-preview"
        model_info:
          base_model: gpt-5-mini

    litellm_settings:
      drop_params: true
      num_retries: 3
      success_callback:
        - strip_top_p.strip_top_p

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
