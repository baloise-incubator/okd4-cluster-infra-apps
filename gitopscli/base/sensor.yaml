apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: github-sync-apps
spec:
  eventBusName: default
  dependencies:
    - name: github-push
      eventSourceName: github-webhook
      eventName: github
  triggers:
    - template:
        name: sync-apps
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: sync-apps-
              spec:
                workflowTemplateRef:
                  name: gitopscli-sync-apps
                arguments:
                  parameters:
                    - name: organisation
                    - name: repository-name
          parameters:
            - src:
                dependencyName: github-push
                dataKey: body.repository.owner.login
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: github-push
                dataKey: body.repository.name
              dest: spec.arguments.parameters.1.value
      retryStrategy:
        steps: 3
