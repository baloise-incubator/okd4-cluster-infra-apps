# Allow argo-dispatch to reach the Argo Workflows server only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argo-dispatch-egress
spec:
  podSelector:
    matchLabels:
      app: argo-dispatch
  policyTypes:
    - Egress
  egress:
    # Argo Workflows server
    - ports:
        - port: 2746
          protocol: TCP
    # DNS (port 53 for service IP, 5353 for OVN-Kubernetes DNAT to CoreDNS pods)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
---
# Workflow pods: allow egress to LiteLLM, GitHub (HTTPS), and DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-workflow-pod-egress
spec:
  podSelector:
    matchLabels:
      workflows.argoproj.io/workflow: ""
  policyTypes:
    - Egress
  egress:
    # LiteLLM
    - ports:
        - port: 4000
          protocol: TCP
    # GitHub HTTPS (git clone/push, API calls)
    - ports:
        - port: 443
          protocol: TCP
    # DNS (port 53 for service IP, 5353 for OVN-Kubernetes DNAT to CoreDNS pods)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
