apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: llm-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless
  target:
    name: llm-creds
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: api-key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /cluster-infra/agent-platform/litellm-api-key
    - secretKey: model
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /cluster-infra/agent-platform/litellm-model
    - secretKey: base-url
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /cluster-infra/agent-platform/litellm-base-url
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless
  target:
    name: github-creds
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    - secretKey: token
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: /github/token
