apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argo-dispatch-egress
spec:
  podSelector:
    matchLabels:
      app: argo-dispatch
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 2746
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-workflow-pod-egress
spec:
  podSelector:
    matchLabels:
      workflows.argoproj.io/workflow: ""
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 4000
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
